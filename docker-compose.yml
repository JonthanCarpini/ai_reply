version: '3.8'

services:
  ai_reply_api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ai_reply_api
    restart: unless-stopped
    env_file:
      - ./api/.env
    volumes:
      - api_storage:/var/www/storage
    networks:
      - web_network
      - ai_reply_internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai-reply-api.rule=Host(`api.aireply.xpainel.online`)"
      - "traefik.http.routers.ai-reply-api.entrypoints=websecure"
      - "traefik.http.routers.ai-reply-api.tls.certresolver=le"
      - "traefik.http.services.ai-reply-api.loadbalancer.server.port=80"
    depends_on:
      - ai_reply_redis

  ai_reply_web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://api.aireply.xpainel.online/api
    container_name: ai_reply_web
    restart: unless-stopped
    networks:
      - web_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai-reply-web.rule=Host(`aireply.xpainel.online`)"
      - "traefik.http.routers.ai-reply-web.entrypoints=websecure"
      - "traefik.http.routers.ai-reply-web.tls.certresolver=le"
      - "traefik.http.services.ai-reply-web.loadbalancer.server.port=3000"

  ai_reply_redis:
    image: redis:7-alpine
    container_name: ai_reply_redis
    restart: unless-stopped
    networks:
      - ai_reply_internal
    volumes:
      - redis_data:/data

volumes:
  api_storage:
  redis_data:

networks:
  web_network:
    external: true
  ai_reply_internal:
    driver: bridge
